    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colourful Elegant Success Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Roboto:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 20%, #fecfef 40%, #fecfef 60%, #fad0c4 80%, #ffd1ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: linear-gradient(145deg, #ffffff 0%, #f0f8ff 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 107, 107, 0.2), 0 10px 30px rgba(255, 193, 7, 0.15);
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.1) 0%, rgba(52, 152, 219, 0.1) 40%, rgba(155, 89, 182, 0.1) 70%, transparent 100%);
            transform: rotate(45deg);
            z-index: 0;
        }
        .card-content {
            position: relative;
            z-index: 1;
        }
        .greeting {
            font-size: 2.5em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .name {
            font-size: 3em;
            font-weight: 700;
            background: linear-gradient(45deg, #9b59b6, #3498db, #e74c3c, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            filter: hue-rotate(0deg); /* Optional animation could be added */
        }
        .subtext {
            font-family: 'Roboto', sans-serif;
            font-size: 1.2em;
            color: #7f8c8d;
            margin-top: 10px;
            font-style: italic;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
        }
        .decoration {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 4em;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            z-index: 0;
            animation: sparkle 2s ease-in-out infinite alternate;
        }
        @keyframes sparkle {
            from { transform: scale(1) rotate(0deg); }
            to { transform: scale(1.1) rotate(5deg); }
        }
        .left-decoration {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 3em;
            color: rgba(255, 193, 7, 0.3);
            z-index: 0;
        }
        .bottom-decoration {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            color: rgba(52, 152, 219, 0.2);
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="decoration">✦</div>
        <div class="left-decoration">◆</div>
        <div class="bottom-decoration">✧ ☆ ✧</div>
        <div class="card-content">
            <h1 class="greeting">I Hope You All the Success</h1>
            <h2 class="name">Omar</h2>
            <p class="subtext">Wishing you endless achievements and joy in a spectrum of colors.</p>
        </div>
    </div>
</body>
</html>

</body>
</html>
