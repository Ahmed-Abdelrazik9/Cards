    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dancing Roses Card</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff7b94 0%, #f56217 50%, #f8b500 100%);
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .card {
            width: 450px;
            height: 650px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 50px;
            box-sizing: border-box;
        }
        .rose-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            background: 
                radial-gradient(circle at 30% 70%, #ff1493 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, #dc143c 0%, transparent 50%);
        }
        .dancing-roses {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .rose {
            position: absolute;
            font-size: 3em;
            animation: dance 4s ease-in-out infinite;
        }
        .rose:nth-child(1) {
            top: 20%;
            left: 10%;
            animation-delay: 0s;
            color: #ff69b4;
        }
        .rose:nth-child(2) {
            top: 50%;
            right: 15%;
            animation-delay: 1s;
            color: #dc143c;
            font-size: 2.5em;
        }
        .rose:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 2s;
            color: #ff1493;
        }
        .rose:nth-child(4) {
            top: 60%;
            right: 10%;
            animation-delay: 3s;
            color: #c71585;
            transform: rotate(45deg);
        }
        @keyframes dance {
            0%, 100% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.7;
            }
            25% {
                transform: translateY(-20px) rotate(10deg) scale(1.1);
                opacity: 1;
            }
            50% {
                transform: translateY(0) rotate(-5deg) scale(0.9);
                opacity: 0.8;
            }
            75% {
                transform: translateY(-10px) rotate(5deg) scale(1.05);
                opacity: 1;
            }
        }
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffd700;
            border-radius: 50%;
            animation: twinkle 3s linear infinite;
        }
        .sparkle:nth-child(1) { top: 15%; left: 25%; animation-delay: 0s; }
        .sparkle:nth-child(2) { top: 40%; left: 75%; animation-delay: 0.75s; }
        .sparkle:nth-child(3) { bottom: 20%; right: 30%; animation-delay: 1.5s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.5); }
        }
        .message {
            text-align: center;
            z-index: 1;
            position: relative;
            margin-top: 20px;
        }
        .message h1 {
            font-size: 2.2em;
            color: #8b0000;
            margin: 0 0 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            font-style: italic;
        }
        .message p {
            font-size: 1.2em;
            color: #dc143c;
            margin: 0;
            font-weight: bold;
        }
        .floral-border {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 4px solid #ff69b4;
            border-radius: 20px;
            padding: 15px;
            box-sizing: border-box;
        }
        .floral-border::before,
        .floral-border::after {
            content: '🌹';
            position: absolute;
            font-size: 2em;
            color: #ff69b4;
        }
        .floral-border::before { top: -15px; left: 50%; transform: translateX(-50%); }
        .floral-border::after { bottom: -15px; left: 50%; transform: translateX(-50%); }
        .swansea-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.9em;
            color: #666;
            font-style: italic;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="rose-bg"></div>
        <div class="dancing-roses">
            <div class="rose">🌹</div>
            <div class="rose">🌹</div>
            <div class="rose">🌹</div>
            <div class="rose">🌹</div>
        </div>
        <div class="sparkles">
            <div class="sparkle"></div>
            <div class="sparkle"></div>
            <div class="sparkle"></div>
        </div>
        <div class="floral-border"></div>
        <div class="message">
            <h1>Hello Omar,<br>All the Best!</h1>
            <p>With Dancing Roses 🌹</p>
        </div>
        <div class="swansea-note">From Swansea, UK 💕</div>
    </div>
</body>
